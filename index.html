<style>
        .glass-card {
            background: rgba(31, 39, 44, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(143, 245, 255, 0.05) 1px, transparent 1px);
            background-size: 12px 12px;
            pointer-events: none;
        }
        .neon-border-blue {
            border: 1px solid rgba(143, 245, 255, 0.2);
            box-shadow: 0 0 10px rgba(143, 245, 255, 0.1);
        }
        .neon-border-green {
            border: 1px solid rgba(47, 248, 1, 0.2);
            box-shadow: 0 0 10px rgba(47, 248, 1, 0.1);
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(143, 245, 255, 0.5), transparent);
            top: 0;
            animation: scan 3s linear infinite;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
